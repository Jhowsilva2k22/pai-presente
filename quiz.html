<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diagnóstico | Pai Presente</title>
    <meta name="description" content="Descubra seu perfil como pai e receba o guia certo pra você.">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">

    <!-- GOOGLE FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

    <!-- GA4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-XXXXXXXXXX');
    </script>

    <!-- META PIXEL -->
    <script>
        !function(f,b,e,v,n,t,s)
        {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
        n.callMethod.apply(n,arguments):n.queue.push(arguments)};
        if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
        n.queue=[];t=b.createElement(e);t.async=!0;
        t.src=v;s=b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t,s)}(window, document,'script',
        'https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', '1903244050330201');
        fbq('track', 'PageView');
    </script>

    <style>
        :root {
            --ivory: #F5F0EB;
            --warm-black: #0D0B09;
            --warm-dark: #1A1613;
            --surface: #151210;
            --gold: #B8956A;
            --gold-light: #D4B896;
            --gold-pale: #E8D5B8;
            --text-muted: #8A7E74;
            --text-subtle: #5A5148;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: var(--warm-black);
            color: var(--ivory);
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            line-height: 1.5;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 500;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 500px;
        }

        .questions-container {
            width: 100%;
            max-width: 600px;
        }

        .question {
            display: none;
            margin-bottom: 30px;
            animation: fadeIn 0.3s ease-in;
        }

        .question.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question-number {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 500;
            margin-bottom: 20px;
            color: var(--ivory);
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            padding: 15px 20px;
            border: 2px solid var(--gold-pale);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            color: var(--ivory);
            text-align: left;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
        }

        .option:hover {
            background: var(--gold-pale);
            color: var(--warm-black);
            border-color: var(--gold);
        }

        .option.selected {
            background: var(--gold);
            color: var(--warm-black);
            border-color: var(--gold);
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--surface);
            border-radius: 2px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--gold);
            transition: width 0.3s;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .btn-secondary {
            background: transparent;
            color: var(--gold);
            border: 2px solid var(--gold);
        }

        .btn-secondary:hover {
            background: var(--gold);
            color: var(--warm-black);
        }

        .btn-primary {
            background: var(--gold);
            color: var(--warm-black);
        }

        .btn-primary:hover {
            background: var(--gold-light);
        }

        .btn-primary:disabled {
            background: var(--text-subtle);
            cursor: not-allowed;
        }

        .result-screen {
            display: none;
            text-align: center;
            padding: 40px 20px;
            width: 100%;
        }

        .result-screen.active {
            display: block;
        }

        .result-screen h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--gold);
            margin-bottom: 20px;
        }

        .result-screen p {
            color: var(--text-muted);
            margin-bottom: 30px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .lead-form {
            background: var(--surface);
            padding: 30px;
            border-radius: 8px;
            margin-top: 30px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--gold);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid var(--gold-pale);
            border-radius: 4px;
            background: var(--warm-black);
            color: var(--ivory);
            font-family: 'Inter', sans-serif;
        }

        .form-group input::placeholder {
            color: var(--text-subtle);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 2px rgba(184, 149, 106, 0.1);
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .question-text {
                font-size: 1.1rem;
            }

            .option {
                padding: 12px 15px;
                font-size: 0.95rem;
            }

            .button-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="header">
            <h1>Diagnóstico</h1>
            <p>Descubra seu perfil como pai e receba o guia certo pra você</p>
        </div>

        <div class="questions-container" id="questionsContainer"></div>

        <div class="result-screen" id="resultScreen">
            <h2 id="resultTitle"></h2>
            <p id="resultDescription"></p>
            <div class="lead-form">
                <form id="leadForm">
                    <div class="form-group">
                        <label for="name">Nome</label>
                        <input type="text" id="name" name="name" placeholder="Seu nome" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Receber Guia</button>
                </form>
            </div>
        </div>

        <div class="button-group" id="buttonGroup"></div>
    </div>

    <script>
        const questions = [
            {
                question: "Como você se descreveria como pai?",
                options: [
                    { text: "Tradicional e estruturado", value: "tradicional" },
                    { text: "Moderno e flexível", value: "moderno" },
                    { text: "Equilibrado entre os dois", value: "equilibrado" }
                ]
            },
            {
                question: "Qual é sua maior preocupação na criação dos filhos?",
                options: [
                    { text: "Educação e disciplina", value: "educacao" },
                    { text: "Emocional e bem-estar", value: "emocional" },
                    { text: "Desenvolvimento integral", value: "desenvolvimento" }
                ]
            },
            {
                question: "Com qual frequência você busca informações sobre paternidade?",
                options: [
                    { text: "Diariamente", value: "diario" },
                    { text: "Semanalmente", value: "semanal" },
                    { text: "Conforme necessário", value: "conforme_necessario" }
                ]
            },
            {
                question: "Qual é o seu maior desafio atual na paternidade?",
                options: [
                    { text: "Falta de tempo", value: "tempo" },
                    { text: "Insegurança nas decisões", value: "inseguranca" },
                    { text: "Comunicação com os filhos", value: "comunicacao" }
                ]
            }
        ];

        const profiles = {
            tradicional_educacao_diario_tempo: {
                title: "Pai Provedor Estruturado",
                description: "Você valoriza a estrutura e a educação formal. O guia focará em criar rotinas saudáveis e estabelecer limites claros."
            },
            tradicional_educacao_diario_inseguranca: {
                title: "Pai Buscador de Validação",
                description: "Você quer fazer o certo mas duvida de suas decisões. O guia incluirá dicas práticas e reforço positivo."
            },
            moderno_emocional_semanal_comunicacao: {
                title: "Pai Emocionalmente Conectado",
                description: "Você prioriza a conexão emocional e a comunicação aberta. O guia focará em técnicas de diálogo e inteligência emocional."
            },
            equilibrado_desenvolvimento_conforme_necessario_tempo: {
                title: "Pai Equilibrado e Pragmático",
                description: "Você busca um equilíbrio entre estrutura e flexibilidade. O guia oferecerá estratégias adaptáveis para diferentes situações."
            }
        };

        let currentQuestion = 0;
        let answers = {};
        let selectedAnswers = {};

        function getProfile() {
            const answerKeys = Object.values(answers);
            const profileKey = answerKeys.join("_");
            
            // Default profile if combination not found
            return profiles[profileKey] || {
                title: "Pai Presente",
                description: "Você já está no caminho certo por buscar desenvolver-se como pai. O guia é feito especialmente para você."
            };
        }

        function updateProgress() {
            const progress = ((currentQuestion) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function renderQuestion(index) {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';

            const question = questions[index];
            const questionDiv = document.createElement('div');
            questionDiv.className = 'question active';

            questionDiv.innerHTML = `
                <div class="question-number">Pergunta ${index + 1} de ${questions.length}</div>
                <div class="question-text">${question.question}</div>
                <div class="options" id="optionsContainer"></div>
            `;

            container.appendChild(questionDiv);

            const optionsContainer = document.getElementById('optionsContainer');
            question.options.forEach(option => {
                const button = document.createElement('button');
                button.className = 'option';
                if (selectedAnswers[index] === option.value) {
                    button.classList.add('selected');
                }
                button.textContent = option.text;
                button.onclick = () => selectOption(index, option.value);
                optionsContainer.appendChild(button);
            });

            updateProgress();
            renderButtons();
        }

        function selectOption(questionIndex, optionValue) {
            answers[questionIndex] = optionValue;
            selectedAnswers[questionIndex] = optionValue;
            renderQuestion(questionIndex);
        }

        function renderButtons() {
            const buttonGroup = document.getElementById('buttonGroup');
            buttonGroup.innerHTML = '';

            if (currentQuestion > 0) {
                const prevBtn = document.createElement('button');
                prevBtn.className = 'btn btn-secondary';
                prevBtn.textContent = 'Voltar';
                prevBtn.onclick = goToPrevious;
                buttonGroup.appendChild(prevBtn);
            }

            const nextBtn = document.createElement('button');
            nextBtn.className = 'btn btn-primary';
            nextBtn.textContent = currentQuestion === questions.length - 1 ? 'Ver Resultado' : 'Próxima';
            nextBtn.disabled = answers[currentQuestion] === undefined;
            nextBtn.onclick = goToNext;
            buttonGroup.appendChild(nextBtn);
        }

        function goToNext() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion(currentQuestion);
            } else {
                showResult();
            }
        }

        function goToPrevious() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion(currentQuestion);
            }
        }

        function showResult() {
            document.getElementById('questionsContainer').style.display = 'none';
            document.getElementById('buttonGroup').style.display = 'none';

            const profile = getProfile();
            document.getElementById('resultTitle').textContent = profile.title;
            document.getElementById('resultDescription').textContent = profile.description;
            document.getElementById('resultScreen').classList.add('active');

            document.getElementById('leadForm').addEventListener('submit', handleFormSubmit);
        }

        function handleFormSubmit(e) {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;

            // Track in analytics
            if (typeof gtag !== 'undefined') {
                gtag('event', 'lead', {
                    'event_category': 'engagement',
                    'event_label': 'quiz_lead',
                    'user_email': email,
                    'user_name': name
                });
            }

            // Track in Meta
            if (typeof fbq !== 'undefined') {
                fbq('track', 'Lead', { content_name: 'guia_pai_presente' });
            }

            // MailerLite integration
            if (typeof window.MailerLite !== 'undefined' && window.MailerLite) {
                window.MailerLite('subscribe', {
                    email: email,
                    fields: {
                        name: name,
                        profile_type: getProfile().title
                    }
                });
            } else {
                // Fallback: Send to your API endpoint
                fetch('/api/subscribe', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        name: name,
                        profile_type: getProfile().title
                    })
                }).catch(err => console.error('Subscription error:', err));
            }

            setTimeout(function() {
                window.location.href = 'index.html?concluido=1';
            }, 2000);
        }

        // Initialize
        renderQuestion(0);
    </script>

</body>
</html>
